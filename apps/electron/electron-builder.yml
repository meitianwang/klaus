appId: ai.klaus.desktop
productName: Klaus
mac:
  category: public.app-category.developer-tools
  target: dmg
  icon: resources/icon.icns
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - src/renderer/**/*
  - node_modules/**/*
  - package.json
# Bundled connector scripts must be spawnable — asar blocks execution of
# JS files packed inside it, so unpack them to app.asar.unpacked/.
asarUnpack:
  - dist/connectors/**/*
# Ship the skills marketplace alongside the app — SkillsManager resolves it
# from process.resourcesPath in production.
extraResources:
  - from: ../../skills-market
    to: skills-market
    filter:
      - "**/*"
