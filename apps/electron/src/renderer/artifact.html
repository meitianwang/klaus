<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>Artifact</title>
  <link rel="stylesheet" href="vendor/highlight-dark.css" />
  <link rel="stylesheet" href="css/artifact.css" />
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
</head>
<body>
  <div class="aw-titlebar">
    <span id="aw-title" class="aw-title"></span>
  </div>
  <div class="aw-toolbar">
    <div id="aw-viewtoggle" class="aw-viewtoggle">
      <button id="aw-view-source" class="aw-view-btn" title="Source">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="5,4 2,8 5,12"/><polyline points="11,4 14,8 11,12"/></svg>
      </button>
      <button id="aw-view-preview" class="aw-view-btn" title="Preview">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1.5 8s2.5-4.5 6.5-4.5S14.5 8 14.5 8s-2.5 4.5-6.5 4.5S1.5 8 1.5 8z"/><circle cx="8" cy="8" r="2"/></svg>
      </button>
    </div>
    <span class="aw-fileinfo">
      <svg class="aw-fileicon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 2a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1V5.5L9.5 2z"/><path d="M9.5 2v3.5h3.5"/></svg>
      <span id="aw-filename" class="aw-filename"></span>
      <span id="aw-filetype" class="aw-filetype"></span>
    </span>
    <button id="aw-copy" class="aw-icon-btn" title="Copy path">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="6" width="9" height="9" rx="1.5"/><path d="M3 10H2.5A1.5 1.5 0 0 1 1 8.5V2.5A1.5 1.5 0 0 1 2.5 1h6A1.5 1.5 0 0 1 10 2.5V3"/></svg>
    </button>
    <button id="aw-folder" class="aw-icon-btn" title="Reveal in Finder">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 4.5a1 1 0 0 1 1-1h3l1.5 1.5h5.5a1 1 0 0 1 1 1V12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/></svg>
    </button>
  </div>
  <div id="aw-body" class="aw-body"></div>
  <div id="aw-truncated" class="aw-truncated" style="display:none">File truncated (showing first 1 MB)</div>
  <script src="js/artifact.js"></script>
</body>
</html>
