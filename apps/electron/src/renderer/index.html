<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self';">
  <title>Klaus</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="vendor/highlight-dark.css">
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <img src="logo.png" alt="K" style="width:22px;height:22px;border-radius:6px">
          <span>Klaus</span>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
          <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="2"/><line x1="6" y1="1" x2="6" y2="15"/></svg>
        </button>
      </div>

      <div class="sidebar-nav">
        <button class="sidebar-nav-item" id="btn-new-chat">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
          <span data-i18n="new_chat">New chat</span>
        </button>
      </div>

      <div class="sidebar-section-label" data-i18n="recents">Recents</div>

      <div class="session-list" id="session-list"></div>

      <div class="sidebar-footer">
        <div id="user-menu" class="user-menu">
          <div class="user-menu-email" id="user-menu-email">user@local</div>
          <button class="user-menu-item" id="menu-settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            <span data-i18n="menu_settings">Settings</span>
          </button>
          <button class="user-menu-item" id="menu-language">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span data-i18n="menu_language">Language</span>
            <svg class="menu-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button class="user-menu-item" id="menu-help">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span data-i18n="menu_help">Help</span>
          </button>
          <div class="user-menu-sep"></div>
          <button class="user-menu-item" id="menu-logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span data-i18n="menu_logout">Logout</span>
          </button>
        </div>
        <div id="user-menu-lang" class="user-menu-sub"></div>
        <div class="sidebar-user" id="sidebar-user">
          <div class="sidebar-avatar">U</div>
          <div class="sidebar-user-info">
            <div class="sidebar-username">User</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main -->
    <div id="main">
      <div id="header">
        <div class="header-right">
          <span id="collapse-stats" class="collapse-stats" style="display:none"></span>
          <button id="auth-mode-pill" class="auth-mode-pill" title="点击切换认证模式" style="display:none"></button>
          <span id="status"></span>
        </div>
      </div>

      <!-- Welcome -->
      <div id="welcome" class="welcome">
        <div class="welcome-greeting" id="welcome-greeting">Good afternoon</div>
        <div class="welcome-sub" data-i18n="welcome_sub">How can I help you today?</div>
        <div class="welcome-chips">
          <button class="welcome-chip" onclick="sendQuickPrompt('Write')">Write</button>
          <button class="welcome-chip" onclick="sendQuickPrompt('Code')">Code</button>
          <button class="welcome-chip" onclick="sendQuickPrompt('Analyze')">Analyze</button>
          <button class="welcome-chip" onclick="sendQuickPrompt('Explain')">Explain</button>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages" style="display:none"></div>

      <!-- Agent panel -->
      <div id="agent-panel" style="display:none">
        <div id="agent-panel-header">
          <span id="agent-panel-toggle">&#9660;</span>
          <span id="agent-panel-title"></span>
          <span id="agent-panel-count"></span>
          <button id="agent-panel-close" title="Close">&times;</button>
        </div>
        <div id="agent-panel-body"></div>
      </div>

      <!-- Input -->
      <div id="input-wrapper">
        <div id="slash-menu" class="slash-menu hidden"></div>
        <div id="input-area">
          <div id="previews"></div>
          <div class="input-row">
            <button id="attach" title="Attach file">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 8.5l-5.5 5.5a3.5 3.5 0 01-5-5L9 3.5a2 2 0 013 3L6.5 12a.5.5 0 01-1-1L11 5.5"/></svg>
            </button>
            <input type="file" id="file-input" multiple hidden>
            <textarea id="input" rows="1" data-i18n-placeholder="placeholder" placeholder="Send a message..." autocomplete="off"></textarea>
            <button id="send" disabled>
              <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.724 1.053a.5.5 0 0 1 .547-.033l12 7a.5.5 0 0 1 0 .86l-12 7A.5.5 0 0 1 1.5 15.5V9.236l6.735-1.236L1.5 6.764V.5a.5.5 0 0 1 .224-.447z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Settings view -->
      <div id="settings-view">
        <div class="settings-inner">
          <div class="settings-sidebar">
            <button class="settings-back" id="settings-back">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 12L6 8l4-4"/></svg>
              <span data-i18n="back">Back</span>
            </button>
            <div class="settings-sidebar-title" data-i18n="settings">Settings</div>
            <div class="settings-sidebar-nav">
              <button class="settings-nav-item active" data-stab="profile" data-i18n="profile">Profile</button>
              <button class="settings-nav-item" data-stab="models" data-i18n="models">Models</button>
              <button class="settings-nav-item" data-stab="prompts" data-i18n="prompts">Prompts</button>
              <button class="settings-nav-item" data-stab="channels" data-i18n="channels">Channels</button>
              <button class="settings-nav-item" data-stab="skills" data-i18n="skills">Skills</button>
              <button class="settings-nav-item" data-stab="mcp" data-i18n="mcp">MCP</button>
              <button class="settings-nav-item" data-stab="cron" data-i18n="cron">Tasks</button>
              <button class="settings-nav-item" data-stab="preferences" data-i18n="preferences">Preferences</button>
            </div>
          </div>
          <div class="settings-content" id="settings-content"></div>
        </div>
      </div>
    </div>

    <!-- Drop overlay -->
    <div class="drop-overlay" id="drop-overlay">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      Drop files to upload
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/sessions.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
